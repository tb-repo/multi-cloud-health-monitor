# Prometheus configuration for Multi-Cloud Health Monitor

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'health-monitor-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:5000']
        labels:
          instance: 'health-monitor'
          cloud: 'local'
