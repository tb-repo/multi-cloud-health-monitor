# Multi-Cloud Resource Health Monitor - Docker Compose
# Local development stack: nginx + flask + postgres + prometheus + grafana

services:
  # Reverse Proxy
  nginx:
    image: nginx:1.30-alpine
    container_name: hm-nginx
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./app/static:/app/static:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # Flask Application
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: hm-app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://healthmon:healthmon@db:5432/healthmonitor
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; r=requests.get('http://localhost:5000/health'); exit(0 if r.status_code==200 else 1)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # PostgreSQL Database
  db:
    image: postgres:18-alpine
    container_name: hm-db
    environment:
      POSTGRES_USER: healthmon
      POSTGRES_PASSWORD: healthmon
      POSTGRES_DB: healthmonitor
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U healthmon -d healthmonitor"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - backend

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: hm-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - frontend
      - backend

  # Grafana Dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: hm-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped
    networks:
      - frontend
      - backend

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  frontend:
    driver: bridge
  backend:
    driver: bridge
